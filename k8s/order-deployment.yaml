apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: 984365597202.dkr.ecr.us-east-1.amazonaws.com/order-service:latest
        ports:
        - containerPort: 5002
